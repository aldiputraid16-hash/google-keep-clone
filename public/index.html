<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone - UAS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">💡 Keep Clone</div>
        
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-bar" placeholder="Cari catatan berdasarkan judul atau isi...">
        </div>
        
        </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="menu-item active">Catatan</div>
            <div class="menu-item">Pengingat</div>
            <div class="menu-item">Edit label</div>
            <div class="menu-item">Arsipkan</div>
            <div class="menu-item">Sampah</div>
        </aside>

        <main class="main-content">
            <div class="input-container">
                <input type="text" id="note-title" placeholder="Judul">
                <textarea id="note-content" placeholder="Buat catatan..." rows="3"></textarea>
                
                <div class="input-actions-bar">
                    <div class="action-icons">
                        <button type="button" title="Ingatkan saya"><i class="far fa-bell"></i></button>
                        <button type="button" title="Ubah warna"><i class="fas fa-palette"></i></button>
                        <button type="button" id="archive-input-btn" title="Arsipkan"><i class="fas fa-archive"></i></button>
                        <button type="button" title="Lainnya"><i class="fas fa-ellipsis-v"></i></button>
                    </div>
                    <button id="add-note-btn">Tutup</button>
                </div>
            </div>

            <div id="notes-container"></div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
