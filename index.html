<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone - UAS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Atas -->
    <header class="navbar">
        <div class="logo">💡 Keep Clone</div>
    </header>

    <!-- Form Input Catatan (Mirip Kotak di Google Keep) -->
    <div class="form-container">
        <div class="note-form">
            <input type="text" id="note-title" placeholder="Judul">
            <textarea id="note-content" placeholder="Buat catatan..."></textarea>
            <div class="form-footer">
                <button id="add-note-btn">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Area Grid Catatan (Tempat catatan berjejer seperti di foto) -->
    <div class="main-content">
        <div id="notes-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
