<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone - UAS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Google Keep Clone</h1>
    
    <div class="note-form">
        <input type="text" id="note-title" placeholder="Judul Catatan...">
        <textarea id="note-content" placeholder="Tulis catatan Anda di sini..."></textarea>
        <button id="add-note-btn">Tambah Catatan</button>
    </div>

    <div id="notes-container"></div>

    <script src="app.js"></script>
</body>
</html>
